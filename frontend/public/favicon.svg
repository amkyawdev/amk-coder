<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="20" fill="#0a0a0f"/>
  <g filter="url(#glow)">
    <text x="50" y="65" font-family="monospace" font-size="50" font-weight="bold" fill="url(#grad)" text-anchor="middle">⟨⟩</text>
  </g>
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#grad)" stroke-width="2" stroke-dasharray="8 4" opacity="0.5"/>
</svg>